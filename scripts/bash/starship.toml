"$schema" = 'https://starship.rs/config-schema.json'

format = """
$os\
$username\
[](bg:color_seg2 fg:color_seg1)\
$directory\
[](fg:color_seg2 bg:color_seg3)\
$git_branch\
$git_status\
[](fg:color_seg3 bg:color_seg4)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[](fg:color_seg4 bg:color_seg5)\
$docker_context\
$conda\
$pixi\
[](fg:color_seg5 bg:color_seg6)\
$time\
[](fg:color_seg6)\
$line_break$character"""

palette = 'gradient_dark'

# Gradient: Aurora — green → teal → indigo → violet → purple → deep violet
# Dark text throughout; cool ethereal northern lights feel.
[palettes.gradient_dark]
color_fg0    = '#0f172a'   # slate-900  – dark text on all gradient segments
color_seg1   = '#4ade80'   # green-400  – os / username
color_seg2   = '#2dd4bf'   # teal-400   – directory
color_seg3   = '#818cf8'   # indigo-400 – git branch / status
color_seg4   = '#a78bfa'   # violet-400 – language tools
color_seg5   = '#c084fc'   # purple-400 – docker / conda / pixi
color_seg6   = '#7c3aed'   # violet-700 – time cap
color_green  = '#4ade80'   # green-400
color_red    = '#f87171'   # red-400
color_yellow = '#facc15'   # yellow-400
color_purple = '#c084fc'   # purple-400

[os]
disabled = false
style = "bg:color_seg1 fg:color_fg0"
format = '[ $symbol]($style)'

[os.symbols]
Windows = "󰍲"
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = "󰀵"
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
AOSC = ""
Arch = "󰣇"
Artix = "󰣇"
EndeavourOS = ""
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"
Pop = ""

[username]
show_always = true
style_user = "bg:color_seg1 fg:color_fg0"
style_root = "bg:color_seg1 fg:color_fg0"
format = '[ $user ]($style)'

[directory]
style = "fg:color_fg0 bg:color_seg2"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

[git_branch]
symbol = ""
style = "bg:color_seg3"
format = '[[ $symbol $branch ](fg:color_fg0 bg:color_seg3)]($style)'

[git_status]
style = "bg:color_seg3"
format = '[[($all_status$ahead_behind )](fg:color_fg0 bg:color_seg3)]($style)'

[nodejs]
symbol = ""
style = "bg:color_seg4"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_seg4)]($style)'

[c]
symbol = " "
style = "bg:color_seg4"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_seg4)]($style)'

[cpp]
symbol = " "
style = "bg:color_seg4"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_seg4)]($style)'

[rust]
symbol = ""
style = "bg:color_seg4"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_seg4)]($style)'

[golang]
symbol = ""
style = "bg:color_seg4"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_seg4)]($style)'

[php]
symbol = ""
style = "bg:color_seg4"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_seg4)]($style)'

[java]
symbol = ""
style = "bg:color_seg4"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_seg4)]($style)'

[kotlin]
symbol = ""
style = "bg:color_seg4"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_seg4)]($style)'

[haskell]
symbol = ""
style = "bg:color_seg4"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_seg4)]($style)'

[python]
symbol = ""
style = "bg:color_seg4"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_seg4)]($style)'

[docker_context]
symbol = ""
style = "bg:color_seg5"
format = '[[ $symbol( $context) ](fg:color_fg0 bg:color_seg5)]($style)'

[conda]
style = "bg:color_seg5"
format = '[[ $symbol( $environment) ](fg:color_fg0 bg:color_seg5)]($style)'

[pixi]
style = "bg:color_seg5"
format = '[[ $symbol( $version)( $environment) ](fg:color_fg0 bg:color_seg5)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:color_seg6"
format = '[[  $time ](fg:color_fg0 bg:color_seg6)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[\$](bold fg:color_green)'
error_symbol = '[\$](bold fg:color_red)'
vimcmd_symbol = '[](bold fg:color_green)'
vimcmd_replace_one_symbol = '[](bold fg:color_purple)'
vimcmd_replace_symbol = '[](bold fg:color_purple)'
vimcmd_visual_symbol = '[](bold fg:color_yellow)'
